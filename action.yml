name: "MCP Security Scan"
description: "Scan MCP servers for hardcoded secrets, unsafe exec patterns, and missing auth"
author: "AgentGraph"

branding:
  icon: "shield"
  color: "purple"

inputs:
  repo:
    description: "GitHub repo to scan (owner/repo). Defaults to current repo."
    required: false
    default: ""
  token:
    description: "GitHub token for API access"
    required: false
    default: ${{ github.token }}
  fail-on:
    description: "Fail the check if findings at or above this severity (critical, high, medium)"
    required: false
    default: "critical"
  format:
    description: "Output format (text, json, github)"
    required: false
    default: "github"

outputs:
  trust-score:
    description: "Trust score (0-100)"
  findings-count:
    description: "Total number of findings"
  critical-count:
    description: "Number of critical findings"
  report:
    description: "Full scan report in JSON"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install mcp-security-scan
      shell: bash
      run: pip install "${{ github.action_path }}"

    - name: Run scan
      id: scan
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
      run: |
        REPO="${{ inputs.repo }}"
        if [ -z "$REPO" ]; then
          REPO="${{ github.repository }}"
        fi

        # Run scan and capture output
        mcp-security-scan "$REPO" \
          --token "$GITHUB_TOKEN" \
          --format json \
          --output /tmp/mcp-scan-report.json \
          --fail-on "${{ inputs.fail-on }}" || EXIT_CODE=$?

        # Parse outputs from JSON
        if [ -f /tmp/mcp-scan-report.json ]; then
          TRUST_SCORE=$(python3 -c "import json; print(json.load(open('/tmp/mcp-scan-report.json'))['trust_score'])")
          FINDINGS=$(python3 -c "import json; print(json.load(open('/tmp/mcp-scan-report.json'))['findings_count'])")
          CRITICAL=$(python3 -c "import json; print(json.load(open('/tmp/mcp-scan-report.json'))['critical_count'])")

          echo "trust-score=$TRUST_SCORE" >> "$GITHUB_OUTPUT"
          echo "findings-count=$FINDINGS" >> "$GITHUB_OUTPUT"
          echo "critical-count=$CRITICAL" >> "$GITHUB_OUTPUT"
          echo "report=$(cat /tmp/mcp-scan-report.json)" >> "$GITHUB_OUTPUT"
        fi

        exit ${EXIT_CODE:-0}

    - name: Post comment (PR only)
      if: github.event_name == 'pull_request' && inputs.format == 'github'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
      run: |
        REPO="${{ inputs.repo }}"
        if [ -z "$REPO" ]; then
          REPO="${{ github.repository }}"
        fi

        # Generate GitHub-formatted comment
        COMMENT=$(mcp-security-scan "$REPO" --token "$GITHUB_TOKEN" --format github 2>/dev/null || true)

        if [ -n "$COMMENT" ]; then
          # Post as PR comment
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "$COMMENT" || true
        fi
